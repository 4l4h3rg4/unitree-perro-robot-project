<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unitree Go2 - Dashboard</title>
<link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
<div class="container">
  <header>
    <h1>🐾 Unitree Go2 Dashboard</h1>
    <div class="connection-status">
      <span id="conn-indicator" class="dot disconnected"></span>
      <span id="conn-label">Desconectado</span>
    </div>
  </header>

  <div class="grid">
    <!-- Cámara -->
    <div class="card card-camera">
      <h3>📷 Cámara en vivo</h3>
      <div class="camera-frame">
        <div class="camera-placeholder" id="camera-placeholder">
          <span>Esperando stream...</span>
        </div>
        <img id="camera-img" class="camera-stream" alt="Cámara del robot" style="display:none">
        <div id="camera-overlay" class="camera-overlay" style="display:none"></div>
      </div>
    </div>

    <!-- Agente: input + comandos -->
    <aside class="card card-agent">
      <h3>🧠 Hablale al robot</h3>

      <div class="reasoning-bubble" id="reasoning-text">
        Esperando instrucciones...
      </div>

      <div class="prompt-bar">
        <input id="prompt-input" type="text" placeholder="Ej: avanza, izquierda, love, baila..."
               autocomplete="off" onkeydown="if(event.key==='Enter')sendPrompt()">
        <button id="prompt-mic" class="btn-mic" onclick="toggleRecording()" title="Hablar por voz">🎤</button>
        <button id="prompt-send" onclick="sendPrompt()">➤</button>
      </div>

      <div class="chips-label">Acciones rápidas</div>
      <div class="prompt-chips">
        <button onclick="quickPrompt('avanza')">⬆️ Avanza</button>
        <button onclick="quickPrompt('retrocede')">⬇️ Retrocede</button>
        <button onclick="quickPrompt('izquierda')">⬅️ Izquierda</button>
        <button onclick="quickPrompt('derecha')">➡️ Derecha</button>
        <button onclick="quickPrompt('parate')">🧍 Párate</button>
        <button onclick="quickPrompt('sientate')">🪑 Siéntate</button>
        <button onclick="quickPrompt('saluda')">👋 Saluda</button>
        <button onclick="quickPrompt('love')">❤️ Love</button>
        <button onclick="quickPrompt('baila')">🕺 Baila</button>
      </div>

      <div class="alerts-mini" id="alerts-container"></div>

      <button id="btn-emergency" class="btn-emergency" onclick="emergencyStop()">
        🛑 STOP DE EMERGENCIA
      </button>
    </aside>
  </div>
</div>

<script src="/static/dashboard.js?v=2"></script>
</body>
</html>
